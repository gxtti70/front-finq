<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm relative">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      
      <!-- Lado Izquierdo: Logo y Links -->
      <div class="flex items-center gap-8">
        <!-- Logo -->
        <div class="flex items-center gap-2 cursor-pointer">
          <div class="w-8 h-8 bg-finq-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">
            F
          </div>
          <!-- Le quitamos el 'hidden sm:block' al final de esta línea -->
          <span class="font-bold text-xl tracking-tight text-gray-900">FinQ</span>
        </div>

        <!-- Links Desktop (Ocultos en móvil) -->
        <div class="hidden sm:flex sm:items-center sm:space-x-8 h-full">
          <a href="#" class="text-finq-primary flex items-center gap-1 font-medium transition-colors border-b-2 border-finq-primary h-full mt-1">
            <i class='bx bx-grid-alt text-xl'></i> Dashboard
          </a>
          <a href="#" class="text-gray-500 hover:text-finq-primary flex items-center gap-1 font-medium transition-colors h-full mt-1 border-b-2 border-transparent hover:border-gray-300">
            <i class='bx bx-transfer text-xl'></i> Movimientos
          </a>
        </div>
      </div>

      <!-- Lado Derecho: Billetera, Perfil y Menú Móvil -->
      <div class="flex items-center gap-4">
        
        <!-- Mi Billetera con Icono -->
        <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-gray-50 rounded-full border border-gray-100 text-gray-700">
          <i class='bx bx-wallet text-finq-primary text-xl'></i>
          <span class="text-sm font-medium">Mi Billetera</span>
        </div>

        <!-- Perfil con Dropdown -->
        <div class="relative">
          <button (click)="toggleProfileMenu()" class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center hover:bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-finq-primary focus:ring-offset-2">
            <i class='bx bx-user text-gray-600 text-xl'></i>
          </button>

          <!-- Dropdown del Perfil -->
          @if (isProfileMenuOpen()) {
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50 animate-fade-in">
              <div class="px-4 py-3 border-b border-gray-50">
                <p class="text-sm font-semibold text-gray-900">Santiago</p>
                <p class="text-xs text-gray-500 truncate">santiago@finq.com</p>
              </div>
              <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-finq-primary transition-colors flex items-center gap-2">
                <i class='bx bx-cog'></i> Configuración
              </a>
              <a href="#" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2 mt-1">
                <i class='bx bx-log-out'></i> Cerrar Sesión
              </a>
            </div>
          }
        </div>

        <!-- Botón Menú Hamburguesa (Solo Móvil) -->
        <div class="sm:hidden flex items-center ml-2">
          <button (click)="toggleMobileMenu()" class="text-gray-500 hover:text-gray-700 focus:outline-none p-1">
            <i class='bx text-3xl' [class.bx-menu]="!isMobileMenuOpen()" [class.bx-x]="isMobileMenuOpen()"></i>
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Menú Móvil Desplegable -->
  @if (isMobileMenuOpen()) {
    <div class="sm:hidden bg-white border-t border-gray-100 shadow-lg absolute w-full z-40">
      <div class="px-4 pt-2 pb-4 space-y-1">
        <a href="#" class="block px-3 py-3 rounded-md text-base font-medium text-finq-primary bg-indigo-50 flex items-center gap-2">
          <i class='bx bx-grid-alt text-xl'></i> Dashboard
        </a>
        <a href="#" class="block px-3 py-3 rounded-md text-base font-medium text-gray-600 hover:bg-gray-50 flex items-center gap-2">
          <i class='bx bx-transfer text-xl'></i> Movimientos
        </a>
        <div class="mt-4 pt-4 border-t border-gray-100">
          <div class="flex items-center gap-2 px-3 py-2 text-gray-700">
            <i class='bx bx-wallet text-finq-primary text-xl'></i>
            <span class="text-base font-medium">Mi Billetera</span>
          </div>
        </div>
      </div>
    </div>
  }
</nav>
